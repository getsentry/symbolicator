name: Weekly CI

on:
  schedule:
    - cron: "0 0 * * 1" # every monday at 00:00
  workflow_dispatch:

env:
  RUSTFLAGS: -Dwarnings

jobs:
  weekly-ci:
    strategy:
      fail-fast: false
      matrix:
        rust: [nightly, beta]

    runs-on: ubuntu-latest

    steps:
      - name: Install libcurl-dev
        run: |
          sudo apt update
          sudo apt-get install -y libcurl4-openssl-dev

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install rust stable toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component clippy --no-self-update
          rustup default ${{ matrix.rust }}

      - run: cargo clippy --all-features --workspace --tests --examples -- -D clippy::all

      - run: cargo test --workspace --all-features

  weekly-audit:
    name: Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # FIXME: find a maintained alternative to audit-check
      - uses: actions-rs/audit-check@24a24e9d5c8179709dd1ad4d7ba661572de756e6 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
